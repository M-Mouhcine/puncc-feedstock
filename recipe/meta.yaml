{% set name = "puncc" %}
{% set version = "0.9.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/puncc-{{ version }}.tar.gz
  sha256: 394ca3912cdd539255a1b0e3897ca94ce98497b398370c5a1f42d9079e3d4f1f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - joblib
    - matplotlib-base
    - numpy
    - pandas
    - scikit-learn
    - tqdm

test:
  imports:
    - deel.puncc
    - deel.puncc.api
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/deel-ai/puncc
  summary: Predictive UNcertainty Calibration and Conformalization Library
  license_file: MIT-Clause.txt
  license: MIT

extra:
  recipe-maintainers:
    - M-Mouhcine
    - CyrilJl
